<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
 <style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #121212;
    color: #e0e0e0;
}

h1, h2 {
    color: #ffffff;
}

p {
    color: #cccccc;
}

/* Navbar */
nav {
    margin-bottom: 20px;
}

nav a {
    text-decoration: none;
    color: #4da6ff;
    margin-right: 10px;
}

nav a:hover {
    color: #80c1ff;
}

/* Sections (cards) */
section {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

/* Center layout */
main {
    max-width: 800px;
    margin: auto;
}

/* Form */
input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background-color: #2a2a2a;
    color: white;
    border: 1px solid #444;
}

button {
    padding: 10px;
    background-color:#36424e;
    color: rgb(6, 6, 6);
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #80c1ff;
}</style>
</head>
<body>

<header>
   <h1>Astranox-Devops</h1>
    <fieldset>
        <legend>Find Out More About Me</legend>
    <nav>
        <button type="button">
        <a href="index.html">Home</a> </button>|
        <button type="button">
        <a href="about.html">About</a> </button>|
        <button type="button">
        <a href="projects.html">Projects</a> </button>|
        <button type="button">
        <a href="contact.html">Contact</a></button>
    </nav>
    </fieldset>
</header>

<main>
    <section>
        
      <fieldset>
        <legend><h2>Get in Touch</h2></legend>
        <form name="contact" method="post" data-netlify="true">
            <input type="hidden" name="form-name" value="contact">
            <label for="name">Name:</label><br>
            <input type="text" name="name" id="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" name="email" id="email"><br><br>

            <label for="message">Message:</label><br>
            <textarea name="message" id="message"></textarea><br><br>

            <button type="submit">Send</button>
        </form>
        </fieldset>
    </section>
</main>

<footer>
    <p>© 2026</p>
</footer>

</body>
</html>
